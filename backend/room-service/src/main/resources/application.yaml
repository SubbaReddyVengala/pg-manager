# backend/auth-service/src/main/resources/application.yml
server:
  port: 8082

spring:
  application:
    name: room-service
  datasource:
    url: jdbc:postgresql://localhost:5432/pgmanager?currentSchema=auth_schema
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: validate
    show-sql: false
    properties.hibernate.default_schema: room_schema
  flyway:
    schemas: room_schema    
    locations: classpath:db/migration

jwt:
  secret: dev-secret-change-in-prod-must-be-32-chars-min
  expiration: 900000          # 15 minutes
  refresh-expiration: 604800000  # 7 days
