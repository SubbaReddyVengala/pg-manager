# backend/api-gateway/src/main/resources/application.yml

server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        # Auth public routes - NO JWT check
        - id: auth-public
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/login,/api/auth/register,/api/auth/refresh
          filters:
            - StripPrefix=1

        # Auth secured routes - JWT required
        - id: auth-secured
          uri: http://localhost:8081
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

        # Room service
        - id: room-service
          uri: http://localhost:8082
          predicates:
            - Path=/api/rooms/**
          filters:
            - StripPrefix=1

        # Tenant service
        - id: tenant-service
          uri: http://localhost:8083
          predicates:
            - Path=/api/tenants/**
          filters:
            - StripPrefix=1

        # Payment service
        - id: payment-service
          uri: http://localhost:8084
          predicates:
            - Path=/api/payments/**
          filters:
            - StripPrefix=1

        # Complaint service
        - id: complaint-service
          uri: http://localhost:8085
          predicates:
            - Path=/api/complaints/**
          filters:
            - StripPrefix=1

        # Expense service
        - id: expense-service
          uri: http://localhost:8086
          predicates:
            - Path=/api/expenses/**
          filters:
            - StripPrefix=1

        # Notification service
        - id: notification-service
          uri: http://localhost:8087
          predicates:
            - Path=/api/notifications/**
          filters:
            - StripPrefix=1

        # Report service
        - id: report-service
          uri: http://localhost:8088
          predicates:
            - Path=/api/reports/**
          filters:
            - StripPrefix=1

jwt:
  secret: dev-secret-change-in-prod-must-be-32-chars-min

management:
  endpoints:
    web: