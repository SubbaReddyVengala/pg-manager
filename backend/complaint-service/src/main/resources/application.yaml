server:
  port: 8085
spring:
  application:
    name: complaint-service
  datasource:
    url: jdbc:postgresql://localhost:5432/pgmanager?currentSchema=complaint_schema
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate.ddl-auto: validate
    show-sql: false
    properties.hibernate.default_schema: complaint_schema   # Change per service
  flyway:
    schemas: complaint_schema    # Change per service
    locations: classpath:db/migration

jwt:
  secret: dev-secret-change-in-prod-must-be-32-chars-min
  expiration: 900000          # 15 minutes
  refresh-expiration: 604800000  # 7 days
